{% extends 'base.html' %}

{% block title %}Goal Tracking - N-Assist{% endblock %}
{% block page_title %}Goal Tracking Board{% endblock %}

{% block head %}
<style>
    .goals-container {
        display: flex;
        gap: 24px;
    }
    
    .goals-list-panel {
        flex: 1.6;
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }
    
    .goals-form-panel {
        flex: 1;
        padding: 24px;
        height: fit-content;
        position: sticky;
        top: 24px;
    }
    
    .goals-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
        max-height: 600px;
        overflow-y: auto;
        padding-right: 6px;
    }
    
    .goals-grid::-webkit-scrollbar {
        width: 6px;
    }
    .goals-grid::-webkit-scrollbar-track {
        background: transparent;
    }
    .goals-grid::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 10px;
    }
    .goals-grid::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.15);
    }
    
    .goal-card {
        padding: 20px;
        border-radius: 20px;
        border: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
        gap: 16px;
        position: relative;
        transition: transform var(--transition-fast), border-color var(--transition-fast), box-shadow var(--transition-smooth);
        animation: fadeIn 0.3s ease-out;
    }
    
    .goal-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
    }
    
    .goal-card.completed-card {
        border-color: rgba(16, 185, 129, 0.3);
        background: rgba(16, 185, 129, 0.02);
    }
    
    body.light-theme .goal-card.completed-card {
        background: rgba(16, 185, 129, 0.01);
    }
    
    .goal-card.overdue-card {
        border-color: rgba(244, 63, 94, 0.3);
        background: rgba(244, 63, 94, 0.02);
    }
    
    .goal-card-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
    }
    
    .goal-card-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--text-primary);
        line-height: 1.4;
    }
    
    .goal-badge {
        padding: 2px 8px;
        border-radius: 6px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
    }
    .badge-active { background: rgba(0, 242, 254, 0.12); color: #00ffd0; border: 1px solid rgba(0, 242, 254, 0.2); }
    .badge-completed { background: rgba(0, 255, 159, 0.12); color: #00ff9f; border: 1px solid rgba(0, 255, 159, 0.2); }
    .badge-overdue { background: rgba(255, 23, 68, 0.12); color: #ff1744; border: 1px solid rgba(255, 23, 68, 0.2); }
    
    .goal-progress-section {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }
    
    .goal-progress-stats {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-secondary);
    }
    
    .goal-progress-bar-bg {
        width: 100%;
        height: 8px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
        overflow: hidden;
    }
    
    body.light-theme .goal-progress-bar-bg {
        background: rgba(0, 0, 0, 0.05);
    }
    
    .goal-progress-bar-fill {
        height: 100%;
        background: var(--primary-gradient);
        border-radius: 10px;
        transition: width 0.4s ease-out;
        box-shadow: 0 0 10px var(--shadow-glow);
    }
    
    .goal-progress-bar-fill.fill-completed {
        background: linear-gradient(135deg, #10b981, #059669);
        box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
    }
    
    .goal-meta {
        font-size: 12px;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: 6px;
        font-weight: 500;
    }
    
    .goal-meta i {
        width: 14px;
        height: 14px;
    }
    
    .goal-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 4px;
        border-top: 1px solid var(--border-color);
        padding-top: 12px;
    }
    
    .goal-controls {
        display: flex;
        align-items: center;
        gap: 8px;
    }
    
    .goal-control-btn {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        border: 1px solid var(--border-color);
        background: rgba(255, 255, 255, 0.02);
        color: var(--text-primary);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: var(--transition-fast);
    }
    .goal-control-btn:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: var(--border-hover);
        transform: scale(1.05);
    }
    
    body.light-theme .goal-control-btn {
        background: rgba(0, 0, 0, 0.02);
    }
    body.light-theme .goal-control-btn:hover {
        background: rgba(0, 0, 0, 0.04);
    }
    
    .goal-control-btn i {
        width: 14px;
        height: 14px;
    }
    
    .goal-delete-btn {
        background: transparent;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        padding: 6px;
        border-radius: 8px;
        transition: var(--transition-fast);
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .goal-delete-btn:hover {
        color: var(--danger-color);
        background: rgba(244, 63, 94, 0.08);
    }
    
    .goal-delete-btn i {
        width: 16px;
        height: 16px;
    }
    
    .completion-celebration {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        overflow: hidden;
        border-radius: 20px;
    }
    
    .confetti-particle {
        position: absolute;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        animation: confettiFall 1.5s ease-out forwards;
    }
    
    @keyframes confettiFall {
        0% { transform: translateY(0) rotate(0deg); opacity: 1; }
        100% { transform: translateY(120px) rotate(360deg); opacity: 0; }
    }
    
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    
    @media (max-width: 1024px) {
        .goals-container {
            flex-direction: column-reverse;
        }
        .goals-form-panel {
            position: relative;
            top: 0;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="goals-container">
    <!-- Goals List Panel -->
    <div class="goals-list-panel glass-panel">
        <div class="panel-header">
            <h3><i data-lucide="target" class="purple-icon"></i> My Personal Goals</h3>
            <span class="form-help" id="goalsSummaryText">0 Goals Active</span>
        </div>
        
        <div class="goals-grid" id="goalsGrid">
            <div class="loading-spinner"></div>
        </div>
    </div>
    
    <!-- Goals Form Panel -->
    <div class="goals-form-panel glass-panel">
        <div class="panel-header">
            <h3><i data-lucide="plus-circle" class="purple-icon"></i> Define New Goal</h3>
        </div>
        <form id="goalForm" style="display: flex; flex-direction: column; gap: 16px;">
            <div class="form-group" style="margin-bottom: 0;">
                <label><i data-lucide="pencil"></i> Goal Name</label>
                <input type="text" id="goalTitle" placeholder="e.g. Complete 100 DSA Problems" required>
            </div>
            
            <div class="form-row">
                <div class="form-group half-width" style="margin-bottom: 0;">
                    <label><i data-lucide="check-circle-2"></i> Current Value</label>
                    <input type="number" id="goalCurrentValue" value="0" min="0" required>
                </div>
                <div class="form-group half-width" style="margin-bottom: 0;">
                    <label><i data-lucide="flag"></i> Target Value</label>
                    <input type="number" id="goalTargetValue" value="10" min="1" required>
                </div>
            </div>
            
            <div class="form-group" style="margin-bottom: 0;">
                <label><i data-lucide="calendar"></i> Target Deadline</label>
                <input type="date" id="goalDeadline" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="justify-content: center; width: 100%; margin-top: 10px;">
                <i data-lucide="plus"></i> Start Goal
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let goalsData = [];

    document.addEventListener("DOMContentLoaded", () => {
        loadGoals();
        setupForm();
        
        // Default the date input to one month from today
        const nextMonth = new Date();
        nextMonth.setMonth(nextMonth.getMonth() + 1);
        document.getElementById('goalDeadline').valueAsDate = nextMonth;
    });

    async function loadGoals() {
        try {
            const res = await fetch('/api/goals');
            if (!res.ok) throw new Error("Could not load goals");
            
            goalsData = await res.json();
            renderGoals();
        } catch (err) {
            console.error(err);
            showToast("Failed to load goals", "error");
        }
    }

    function renderGoals() {
        const grid = document.getElementById('goalsGrid');
        
        const activeCount = goalsData.filter(g => !g.completed).length;
        document.getElementById('goalsSummaryText').innerText = `${activeCount} Active / ${goalsData.length} Total Goals`;

        if (goalsData.length === 0) {
            grid.innerHTML = `
                <div class="empty-state" style="padding: 40px; text-align: center; color: var(--text-muted); grid-column: 1 / -1;">
                    <i data-lucide="target" style="width: 48px; height: 48px; margin-bottom: 12px; color: var(--text-muted);"></i>
                    <p>No goals defined yet. Define goals to track your growth!</p>
                </div>
            `;
            lucide.createIcons();
            return;
        }

        grid.innerHTML = '';
        goalsData.forEach(g => {
            const dateObj = new Date(g.deadline);
            const formattedDate = dateObj.toLocaleDateString(undefined, {month: 'short', day: 'numeric', year: 'numeric'});
            
            const badgeClass = g.completed ? 'badge-completed' : g.is_overdue ? 'badge-overdue' : 'badge-active';
            const badgeLabel = g.completed ? 'Completed' : g.is_overdue ? 'Overdue' : 'Active';
            
            let cardStateClass = '';
            if (g.completed) cardStateClass = 'completed-card';
            else if (g.is_overdue) cardStateClass = 'overdue-card';
            
            const card = document.createElement('div');
            card.className = `goal-card glass-panel ${cardStateClass}`;
            card.id = `goal-card-${g.id}`;
            card.innerHTML = `
                <div class="completion-celebration" id="celebrate-${g.id}"></div>
                <div class="goal-card-header">
                    <span class="goal-card-title">${escapeHTML(g.title)}</span>
                    <span class="goal-badge ${badgeClass}">${badgeLabel}</span>
                </div>
                <div class="goal-progress-section">
                    <div class="goal-progress-stats">
                        <span>${g.current_value} / ${g.target_value}</span>
                        <span>${g.progress_percentage}%</span>
                    </div>
                    <div class="goal-progress-bar-bg">
                        <div class="goal-progress-bar-fill ${g.completed ? 'fill-completed' : ''}" style="width: ${g.progress_percentage}%"></div>
                    </div>
                </div>
                <div class="goal-meta">
                    <i data-lucide="calendar"></i>
                    <span>Deadline: ${formattedDate}</span>
                </div>
                <div class="goal-actions">
                    <div class="goal-controls">
                        <button class="goal-control-btn" onclick="updateProgress(${g.id}, -1)" ${g.completed ? 'disabled' : ''} title="Decrease progress">
                            <i data-lucide="minus"></i>
                        </button>
                        <button class="goal-control-btn" onclick="updateProgress(${g.id}, 1)" ${g.completed ? 'disabled' : ''} title="Increase progress">
                            <i data-lucide="plus"></i>
                        </button>
                    </div>
                    <button class="goal-delete-btn" onclick="deleteGoal(${g.id})" title="Delete Goal">
                        <i data-lucide="trash-2"></i>
                    </button>
                </div>
            `;
            grid.appendChild(card);
        });
        lucide.createIcons();
    }

    async function updateProgress(goalId, delta) {
        try {
            const res = await fetch(`/api/goals/${goalId}/progress`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ delta })
            });

            if (res.ok) {
                const data = await res.json();
                
                // Update local data
                const idx = goalsData.findIndex(g => g.id === goalId);
                if (idx !== -1) {
                    goalsData[idx] = data.goal;
                }
                
                // Render
                renderGoals();
                
                if (data.just_completed) {
                    showToast("🏆 Goal Achieved! Great job!", "success");
                    triggerConfetti(goalId);
                }
            } else {
                showToast("Failed to update progress", "error");
            }
        } catch (err) {
            console.error(err);
            showToast("Connection error", "error");
        }
    }

    function triggerConfetti(goalId) {
        const container = document.getElementById(`celebrate-${goalId}`);
        if (!container) return;
        
        container.innerHTML = '';
        const colors = ['#00f2fe', '#4facfe', '#00ffd0', '#00ff9f', '#ffd600'];
        
        for (let i = 0; i < 40; i++) {
            const particle = document.createElement('div');
            particle.className = 'confetti-particle';
            particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 20 + '%';
            particle.style.animationDelay = Math.random() * 0.4 + 's';
            
            // Random direction
            const angle = Math.random() * Math.PI * 2;
            const distance = Math.random() * 80 + 30;
            const x = Math.cos(angle) * distance;
            const y = Math.sin(angle) * distance + 40;
            
            particle.style.setProperty('--x', `${x}px`);
            particle.style.setProperty('--y', `${y}px`);
            
            container.appendChild(particle);
        }
    }

    async function deleteGoal(id) {
        if (!confirm("Are you sure you want to delete this goal?")) return;
        
        try {
            const res = await fetch(`/api/goals/${id}`, { method: 'DELETE' });
            if (res.ok) {
                showToast("Goal deleted successfully!", "success");
                loadGoals();
            } else {
                showToast("Failed to delete goal", "error");
            }
        } catch (err) {
            console.error(err);
            showToast("Connection error", "error");
        }
    }

    function setupForm() {
        const form = document.getElementById('goalForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('goalTitle').value.trim();
            const currentValue = parseInt(document.getElementById('goalCurrentValue').value);
            const targetValue = parseInt(document.getElementById('goalTargetValue').value);
            const deadline = document.getElementById('goalDeadline').value;
            
            if (targetValue <= 0) {
                showToast("Target value must be greater than 0", "error");
                return;
            }
            
            try {
                const res = await fetch('/api/goals', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, current_value: currentValue, target_value: targetValue, deadline })
                });

                if (res.ok) {
                    showToast("Goal started successfully!", "success");
                    form.reset();
                    
                    // Reset deadline to 1 month
                    const nextMonth = new Date();
                    nextMonth.setMonth(nextMonth.getMonth() + 1);
                    document.getElementById('goalDeadline').valueAsDate = nextMonth;
                    document.getElementById('goalCurrentValue').value = 0;
                    document.getElementById('goalTargetValue').value = 10;
                    
                    loadGoals();
                } else {
                    const err = await res.json();
                    showToast(err.error || "Failed to create goal", "error");
                }
            } catch (err) {
                console.error(err);
                showToast("Connection error", "error");
            }
        });
    }
</script>
{% endblock %}
